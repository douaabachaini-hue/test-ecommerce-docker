name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Job 1: Run tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Make test script executable
        run: chmod +x test.sh
      
      - name: Run HTML/CSS/JS validation tests
        run: ./test.sh
      
      - name: Verify HTML files structure
        run: |
          echo "Checking HTML files..."
          for file in index.html products.html registration.html; do
            if [ -f "$file" ]; then
              echo "✓ $file exists"
            else
              echo "✗ $file missing"
              exit 1
            fi
          done

  # Job 2: Build Docker image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          docker build -t ecommerce-website:${{ github.sha }} .
          echo "✓ Docker image built successfully"
      
      - name: Test Docker image
        run: |
          docker run -d --name test-container -p 8080:80 ecommerce-website:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8080 || exit 1
          docker stop test-container
          docker rm test-container
          echo "✓ Docker container test passed"

  # Job 3: Security Scan (Bonus)
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image for scanning
        run: docker build -t ecommerce-website:scan .
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ecommerce-website:scan'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
